<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <br>
    <br>
    <br>
    <br>
    <div class="container" >

        <h1>Registration</h1>

        <h3>Personal Details</h3>
        <br>
        <form>
        <label> Full Name</label>
        <input type="text" name="name" placeholder="Enter Your Name"/>

        <label>Date of Birth</label>
        <input type="Date" name="date of Birth" placeholder="Enter date of Birth"/>

        <label>Email</label>
        <input type="email" name="email" placeholder="Enter your Email"/>

        <br><br>

        <label>Mobile Number</label>
        <Input type="number" name="Mobile number" placeholder="Enter you number"/>

        <label>Gender</label>
        <input type="text" name="Gender" placeholder="Enter Your Gender"/>

        <label>Occupation</label>
        <input type="text" name="Occupation" placeholder="Enter Your Occupation"/>

        </form>
        <br>

        <h3>Identity Details</h3>
        <br>
        <form>
            <label>Id Type</label>
            <input type="text" name="id type" placeholder="Enter Id Type"/>

            <label>Id Number</label>
            <input type="number" name="id number" placeholder="Enter Id Number"/>

            <label>Issue Authority</label>
            <input type="text" name="issue department" placeholder="Enter Issue Department"/>

            <br><br>

            <label>Issue Date</label>
            <input type="date" name="issue date" placeholder="Enter issue date"/>

            <label>Issue State</label>
            <input type="Text" name="issue state" placeholder="Enter issue state"/>

            <label>Expiry Date</label>
            <input type="date" name="Expiry date" placeholder="Enter Expiry date"/>

        </form>

        <br><br><br>

        <a href="login.html"><button>Next -></button> </a>
        




    </div>
</body>
</html>
