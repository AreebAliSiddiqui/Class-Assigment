<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form </title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <br>
    <br>
    <br>
    <br>
    <div class="container">

        <h1>Registration</h1>

        <h3>Personal Details</h3>
        
        <form>
            <div class="row">
            
            <div class="field">  
            <label> Full Name</label>
            <input type="text" name="name" placeholder="Enter Your Name" />
            </div>
            
            <div class="field"> 
            <label>Date of Birth</label>
            <input type="Date" name="date of Birth" placeholder="Enter date of Birth" />
            </div>

            <div class="field"> 
            <label>Email</label>
            <input type="email" name="email" placeholder="Enter your Email" />
            </div>

            </div>

            <br>

            <div class="row">

            <div class="field">    
            <label>Mobile Number</label>
            <Input type="number" name="Mobile number" placeholder="Enter you number" />
            </div>

            <div class="field"> 
            <label>Gender</label>
            <input type="text" name="Gender" placeholder="Enter Your Gender" />
            </div>

            <div class="field"> 
            <label>Occupation</label>
            <input type="text" name="Occupation" placeholder="Enter Your Occupation" />
            </div>

            </div>
        </form>
        <br>

        <h3>Identity Details</h3>
        
        <form>
            <div class="row">
            
            <div class="field">    
            <label>Id Type</label>
            <input type="text" name="id type" placeholder="Enter Id Type" />
            </div>

            <div class="field"> 
            <label>Id Number</label>
            <input type="number" name="id number" placeholder="Enter Id Number" />
            </div>

            <div class="field"> 
            <label>Issue Authority</label>
            <input type="text" name="issue department" placeholder="Enter Issue Department" />
            </div>

            </div>

            <br>
            <div class="row">

            <div class="field">     
            <label>Issue Date</label>
            <input type="date" name="issue date" placeholder="Enter issue date" />
            </div>

            <div class="field"> 
            <label>Issue State</label>
            <input type="Text" name="issue state" placeholder="Enter issue state" />
            </div>

            <div class="field"> 
            <label>Expiry Date</label>
            <input type="date" name="Expiry date" placeholder="Enter Expiry date" />
            </div>

            </div>

        </form>

        <br>

        <a href="login.html"><button class="btn0" >Next -></button></a>





    </div>
</body>

</html>
